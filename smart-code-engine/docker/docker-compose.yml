version: "3.9"

services:
  backend:
    build: ../apps/backend
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    depends_on:
      - db

  worker:
    build: ../packages/worker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - ../.env

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: smartcode
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
