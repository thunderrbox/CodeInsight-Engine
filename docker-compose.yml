services:
  redis:
    image: redis:7-alpine
    container_name: codeinsight-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: codeinsight-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - EXECUTION_TIMEOUT_MS=10000
      - MEMORY_LIMIT_MB=128
      - CPU_QUOTA=50000
      - QUEUE_NAME=code-submissions
      - JOB_ATTEMPTS=3
      - CONCURRENCY=5
    volumes:
      # Mount Docker socket so the API container can spin up runner containers
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: codeinsight-worker
    restart: unless-stopped
    command: node dist/queue/worker.js
    environment:
      - NODE_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - EXECUTION_TIMEOUT_MS=10000
      - MEMORY_LIMIT_MB=128
      - CPU_QUOTA=50000
      - QUEUE_NAME=code-submissions
      - JOB_ATTEMPTS=3
      - CONCURRENCY=5
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis_data:
